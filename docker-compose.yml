version: "3.8"

services:
  moto-hub:
    container_name: moto-hub
    restart: always
    image: node:20.10.0
    ports:
      - "4001:3007"
    volumes:
      - ./:/usr/src/moto-hub
    working_dir: /usr/src/moto-hub
    networks:
      - monorepo-network
    # FOR PRODUCTION
    command: sh -c "npm install && npm run build && npm run start:prod"

  moto-hub-batch:
    container_name: motohub-batch
    restart: always
    image: node:20.10.0
    ports:
      - "4002:3008"
    volumes:
      - ./:/usr/src/moto-hub
    working_dir: /usr/src/moto-hub
    networks:
      - monorepo-network
    # FOR PRODUCTION
    command: sh -c "npm install && npm run build && npm run start:prod:batch"

networks:
  monorepo-network:
    driver: bridge
